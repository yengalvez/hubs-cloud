name: reticulum-ci

on:
  pull_request:
    paths:
      - ".github/workflows/reticulum-ci.yml"
      - "community-edition/services/reticulum/**"
  push:
    paths:
      - ".github/workflows/reticulum-ci.yml"
      - "community-edition/services/reticulum/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reticulum-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PostgreSQL ${{ matrix.postgres }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres:
          - "12.19"
          - "14.23"
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: community-edition/services/reticulum
    env:
      DB_CREDENTIALS: postgres
      DB_HOST: 127.0.0.1
      MIX_ENV: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          elixir-version: "1.18.4"
          otp-version: "27.3.4.14"

      - name: Install package managers
        run: mix do local.hex --force, local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get --only test

      - name: Check dependency advisories
        run: mix hex.audit

      - name: Verify formatting
        run: mix format --check-formatted

      - name: Compile without warnings
        run: mix compile --warnings-as-errors

      - name: Run test suite
        run: mix test

  release:
    name: Build turkey release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: community-edition/services/reticulum
    env:
      MIX_ENV: turkey
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          elixir-version: "1.18.4"
          otp-version: "27.3.4.14"

      - name: Install package managers
        run: mix do local.hex --force, local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get --only turkey

      - name: Compile without warnings
        run: mix compile --warnings-as-errors

      - name: Build release
        run: mix release --overwrite
