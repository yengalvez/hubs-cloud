name: bot-images-build-push

on:
  workflow_dispatch:
    inputs:
      use_build_cache:
        description: Reuse the audited registry build cache
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: hubs-cloud-bot-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: bot-orchestrator
            dockerfile: community-edition/services/bot-orchestrator/Dockerfile
          - image: bot-runner
            dockerfile: community-edition/services/bot-orchestrator/Dockerfile.runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Select approved GHCR credentials
        env:
          PREFERRED_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          PREFERRED_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          FALLBACK_USERNAME: ${{ github.actor }}
          FALLBACK_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$PREFERRED_USERNAME" ] && [ -n "$PREFERRED_PASSWORD" ]; then
            LOGIN_USERNAME="$PREFERRED_USERNAME"
            LOGIN_PASSWORD="$PREFERRED_PASSWORD"
          elif [ -z "$PREFERRED_USERNAME" ] && [ -z "$PREFERRED_PASSWORD" ]; then
            LOGIN_USERNAME="$FALLBACK_USERNAME"
            LOGIN_PASSWORD="$FALLBACK_PASSWORD"
          else
            echo "REGISTRY_USERNAME and REGISTRY_PASSWORD must be configured together." >&2
            exit 1
          fi
          test -n "$LOGIN_USERNAME"
          test -n "$LOGIN_PASSWORD"
          echo "::add-mask::$LOGIN_USERNAME"
          echo "::add-mask::$LOGIN_PASSWORD"
          echo "REGISTRY_LOGIN_USERNAME=$LOGIN_USERNAME" >> "$GITHUB_ENV"
          echo "REGISTRY_LOGIN_PASSWORD=$LOGIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ env.REGISTRY_LOGIN_USERNAME }}
          password: ${{ env.REGISTRY_LOGIN_PASSWORD }}

      - name: Build and push ${{ matrix.image }}
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: community-edition/services/bot-orchestrator
          file: ${{ matrix.dockerfile }}
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: ${{ inputs.use_build_cache && format('type=registry,ref=ghcr.io/{0}/{1}:buildcache', github.repository_owner, matrix.image) || '' }}
          cache-to: ${{ inputs.use_build_cache && format('type=registry,ref=ghcr.io/{0}/{1}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true', github.repository_owner, matrix.image) || '' }}
          provenance: mode=max
          sbom: true
          push: true

      - name: Record immutable image digest
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: printf '%s@%s\n' "$IMAGE" "$DIGEST" >> "$GITHUB_STEP_SUMMARY"
