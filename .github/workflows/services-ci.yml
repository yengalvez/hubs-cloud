name: services-ci

on:
  pull_request:
    paths:
      - ".github/workflows/services-ci.yml"
      - ".github/workflows/bot-images-build-push.yml"
      - "community-edition/generate_script/**"
      - "community-edition/apply/**"
      - "community-edition/input-values.ci.yaml"
      - "community-edition/package*.json"
      - "community-edition/utils.js"
      - "community-edition/services/bot-orchestrator/**"
      - "community-edition/services/coturn/**"
      - "community-edition/services/dialog/**"
      - "community-edition/services/photomnemonic/**"
      - "community-edition/services/spoke/**"
  push:
    paths:
      - ".github/workflows/services-ci.yml"
      - ".github/workflows/bot-images-build-push.yml"
      - "community-edition/generate_script/**"
      - "community-edition/apply/**"
      - "community-edition/input-values.ci.yaml"
      - "community-edition/package*.json"
      - "community-edition/utils.js"
      - "community-edition/services/bot-orchestrator/**"
      - "community-edition/services/coturn/**"
      - "community-edition/services/dialog/**"
      - "community-edition/services/photomnemonic/**"
      - "community-edition/services/spoke/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hubs-cloud-services-${{ github.ref }}
  cancel-in-progress: true

jobs:
  recovery-operation-fence-kind-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      KIND_CLUSTER_NAME: yenhubs-recovery-fence-e2e
      KIND_NODE_IMAGE: kindest/node:v1.34.8@sha256:02722c2dedddcfc00febf5d27fbeb9b7b2c14294c82109ff4a85d89ac9ba3256
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install pinned Kind and kubectl
        env:
          KIND_VERSION: v0.32.0
          KIND_LINUX_AMD64_SHA256: 50030de23cf40a18505f20426f6a8506bedf13c6e509244bd1fa9463721b0f54
          KUBECTL_VERSION: v1.34.8
          KUBECTL_LINUX_AMD64_SHA256: f6249132865c13abe3c9dd5038f5da65849cb86eee1608c001831504e481aa8c
        run: |
          set -euo pipefail
          tool_dir="$RUNNER_TEMP/yenhubs-tools"
          mkdir -p "$tool_dir"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 \
            --output "$tool_dir/kind" \
            "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64"
          printf '%s  %s\n' "$KIND_LINUX_AMD64_SHA256" "$tool_dir/kind" | \
            sha256sum --check --strict
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 \
            --output "$tool_dir/kubectl" \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          printf '%s  %s\n' "$KUBECTL_LINUX_AMD64_SHA256" "$tool_dir/kubectl" | \
            sha256sum --check --strict
          chmod 0755 "$tool_dir/kind" "$tool_dir/kubectl"
          printf '%s\n' "$tool_dir" >> "$GITHUB_PATH"

      - name: Create pinned Kubernetes cluster
        env:
          KUBECONFIG: ${{ runner.temp }}/yenhubs-recovery-fence-e2e.kubeconfig
        run: |
          set -euo pipefail
          kind version
          kind create cluster \
            --name "$KIND_CLUSTER_NAME" \
            --image "$KIND_NODE_IMAGE" \
            --kubeconfig "$KUBECONFIG" \
            --wait 120s
          kubectl wait --for=condition=Ready node --all --timeout=120s

      - name: Exercise recovery operation admission fence
        working-directory: community-edition
        env:
          KUBECONFIG: ${{ runner.temp }}/yenhubs-recovery-fence-e2e.kubeconfig
        run: |
          set -euo pipefail
          npm ci
          fixture_dir="$(mktemp -d)"
          trap 'find "$fixture_dir" -type f -delete; rmdir "$fixture_dir"' EXIT
          HCCE_INPUT_VALUES_PATH="$PWD/input-values.ci.yaml" \
            HCCE_OUTPUT_PATH="$fixture_dir/hcce.yaml" node generate_script/index.js
          node apply/recovery-operation-pod-fence.kind-e2e.mjs \
            "$fixture_dir/hcce.yaml" hcce

      - name: Delete ephemeral cluster
        if: always()
        env:
          KUBECONFIG: ${{ runner.temp }}/yenhubs-recovery-fence-e2e.kubeconfig
        run: |
          if command -v kind >/dev/null 2>&1; then
            kind delete cluster --name "$KIND_CLUSTER_NAME"
          fi

  node-services:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Verify Hubs CE generator
        working-directory: community-edition
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
          npm run test:generator
          npm run test:apply
          fixture_dir="$(mktemp -d)"
          trap 'find "$fixture_dir" -type f -delete; rmdir "$fixture_dir"' EXIT
          HCCE_INPUT_VALUES_PATH="$PWD/input-values.ci.yaml" \
            HCCE_OUTPUT_PATH="$fixture_dir/hcce.yaml" node generate_script/index.js
          HCCE_MANIFEST_PATH="$fixture_dir/hcce.yaml" node generate_script/verify-generated-manifest.js

      - name: Verify bot orchestrator
        working-directory: community-edition/services/bot-orchestrator
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
          npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Verify bot orchestrator control-plane image build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: community-edition/services/bot-orchestrator
          file: community-edition/services/bot-orchestrator/Dockerfile
          push: false

      - name: Verify dedicated bot runner image build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: community-edition/services/bot-orchestrator
          file: community-edition/services/bot-orchestrator/Dockerfile.runner
          push: false

      - name: Verify Dialog
        working-directory: community-edition/services/dialog
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
          npm run lint
          npm test

      - name: Verify Photomnemonic
        working-directory: community-edition/services/photomnemonic
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high
          npm run check
          npm test

      - name: Verify Coturn entrypoint
        working-directory: community-edition/services/coturn
        run: sh test-entrypoint.sh

  spoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 16.13.2

      - name: Install Yarn Classic
        run: npm install --global yarn@1.22.22

      - name: Install dependencies
        working-directory: community-edition/services/spoke
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: yarn install --frozen-lockfile

      - name: Lint, test and build Spoke
        working-directory: community-edition/services/spoke
        run: |
          yarn lint
          yarn unit-tests
          yarn build
